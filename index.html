<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Приглашение | Ананас и вкусняшки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f9e0b5 0%, #fdd998 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: rgba(255, 253, 245, 0.97);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
            max-width: 550px;
            width: 100%;
            padding: 1.8rem 1.5rem 2rem;
            backdrop-filter: blur(2px);
        }
        h1 {
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .message-text {
            background: #fff0e0;
            padding: 20px 16px;
            border-radius: 36px;
            margin-bottom: 1.8rem;
            font-size: 1.05rem;
            line-height: 1.45;
            color: #a5662a;
            border-left: 5px solid #ffb347;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            font-weight: 700;
            color: #bf7f3c;
            display: block;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        input, select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #ffdfb3;
            border-radius: 60px;
            background: white;
            outline: none;
            font-family: inherit;
            transition: 0.2s;
        }
        input:focus, select:focus {
            border-color: #ffaa55;
            box-shadow: 0 0 0 3px rgba(255, 170, 85, 0.2);
        }
        button {
            background: #ff9f4a;
            color: white;
            border: none;
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(255, 159, 74, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:hover {
            background: #e8892c;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(1px);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            margin-top: 20px;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-weight: 500;
            display: none;
            font-size: 0.95rem;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.5rem;
            color: #d9943c;
        }
        @media (max-width: 480px) {
            .card {
                padding: 1.4rem 1.2rem 1.6rem;
                border-radius: 36px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .message-text {
                font-size: 0.95rem;
                padding: 16px;
            }
            label {
                font-size: 0.9rem;
            }
            input, select, button {
                padding: 12px 16px;
                font-size: 0.95rem;
            }
            button {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🍍 Приветик 🧸</h1>
    <div class="message-text">
        Надеюсь, ананас и вкусняшки подняли тебе настроение после смены.<br><br>
        Давай увидимся на этой неделе.<br>
        <strong>Выбери день, когда тебе будет удобно</strong>
    </div>

    <form id="dateForm">
        <div class="form-group">
            <label>📅 Удобный день</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label>⏰ Время</label>
            <input type="time" id="time" required>
        </div>

        <button type="submit" id="submitBtn">
            <span id="btnText">💛 Газ Газ Газ 💛</span>
        </button>
    </form>

    <div id="responseMessage" class="message"></div>
    <footer>♥ нажми — я сразу узнаю и напишу тебе ♥</footer>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbye77rTlPicaFh3ysfx16jFgJHbhhbF8XAGW3Q1W1v_qlQvob52ZxV3sknfTwgVzcBPiQ/exec";

    const form = document.getElementById('dateForm');
    const msgDiv = document.getElementById('responseMessage');
    const submitBtn = document.getElementById('submitBtn');
    const btnTextSpan = document.getElementById('btnText');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;

        if (!date || !time) {
            showMessage("Выбери, пожалуйста, и день, и время 💛", "error");
            return;
        }

        const today = new Date().toISOString().split('T')[0];
        if (date < today) {
            showMessage("Давай выберем сегодня или любой день впереди 😊", "error");
            return;
        }

        submitBtn.disabled = true;
        btnTextSpan.innerHTML = '<span class="loader"></span> Отправляю...';

        try {
            const body = new URLSearchParams({ date, time });
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: body
            });
            // После отправки — всегда успех, так как сообщение в телеграм уходит
            showMessage("✅ Буду ждать встречи 💛", "success");
            form.reset();
        } catch (err) {
            console.error("Fetch error:", err);
            // Показываем дружелюбное сообщение даже при ошибке сети, ведь сообщение могло уйти
            showMessage("✅ Буду ждать встречи 💛", "success");
        } finally {
            submitBtn.disabled = false;
            btnTextSpan.innerHTML = "💛 Газ Газ Газ 💛";
            setTimeout(() => {
                msgDiv.style.display = "none";
            }, 6000);
        }
    });

    function showMessage(text, type) {
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = "block";
    }

    document.getElementById('date').min = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
